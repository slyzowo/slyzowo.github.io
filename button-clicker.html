<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Clicker</title>
</head>
<style>
@media(prefers-color-scheme: dark){
  :root{
    --background:         #121212;
    --navigation:         #1f1f1f;
    --table-of-contents:  #1a1a1a;
    --txt:                #e9e9e9;
    --transparent:        #00000000;
    --basic-font:         Arial;
    --white:              #ffffff;
    --pink:               #ff87fb;
    --red:                #e33b4c;
    --orange:             #ffa940;
    --yellow:             #ffd969;
    --lime:               #67ff5c;
    --green:              #0cb300;
    --light-blue:         #00d9ff;
    --blue:               #3b5ae3;
    --purple:             #7b3be3;
    --grey:               #888888;
    --black:              #141414;
  }

  ::selection{
    background-color: #00b8c586;
    color: white;
  }

  :any-link{
    color: white;
  }

  ::marker{
  color:  #b8b8b8;
  }
}

@media(prefers-color-scheme: light){
  :root{
    --background:         #dddddd;
    --navigation:         #e9e9e9;
    --table-of-contents:  #f5f5f5;
    --txt:                #121212;
    --transparent:        #00000000;
    --basic-font:           Arial;
    --white:              #ffffff;
    --pink:               #ff87fb;
    --red:                #e33b4c;
    --orange:             #ffa940;
    --yellow:             #ffd969;
    --lime:               #67ff5c;
    --green:              #0cb300;
    --light-blue:         #00d9ff;
    --blue:               #3b5ae3;
    --purple:             #7b3be3;
    --grey:               #888888;
    --black:              #141414;
  }

  ::selection{
    background-color: #00aac046;
    color: black;
  }

  :any-link{
    color: black;
  }

  ::marker{
  color:  #b8b8b8;
  }
}

  body{
    font-family: var(--basic-font);
    background-color: var(--background);
    color: var(--txt);
    margin: 0;
  }

  main{
    margin: 25px 25vw 0vh 25vw;
    padding: 1vw;
    background-color: var(--navigation);
    border-radius: 20px;
  }

  nav{
    margin: 0vh 25vw 0vh 25vw;
    padding: 1vw;
    background-color: var(--navigation);
    border-radius: 0px 0px 10px 10px;
    align-items: center;
  }
  nav > a{
    padding-right: 12px;
    display: inline-flex;
    align-items: center;
    text-decoration: none;
  }
  nav > a > img{
    height: 50px;
    width:  50px;
    padding: 0px 10px 0px 0px;
  }
  #counter-display{
    font-size: 5rem;
  }

#button-clicker-reset-btn{
  background-color: var(--red);
  padding: 10px;
  height: 100px;
  width: 100px;
  border-radius: 25px;
  border: none;
  &:hover{
    background-color: #d13747;
  }
  
  &:active{
    background-color: #bb323f;
  }
}

  #increase-btn{
    background-color: var(--light-blue);
    padding: 10px;
    height: 100px;
    width: 100px;
    border-radius: 25px;
    border: none;

    &:hover{
      background-color: #00bddf;
    }

    &:active{
      background-color: #00afce;
    }
  }
</style>
<body>
  <nav>
    <a href="https://slyzowo.net/"><img src="assets/images/logo/home.svg">Home</a>
    <a href="https://slyzowo.net/button-clicker"><img src="assets/images/logo/button-clicker.png">Button Clicker</a>
    <a href="https://slyzowo.net/reviews"><img src="assets/images/logo/book.svg">Reviews</a>
  </nav>
  
  <main>
    <div class="main">
      <h1>Button Clicker</h1>
      <label id="counter-display">0</label><br>
      <button class="backflip-btn" id="increase-btn">Click me!</button>
      <button class="backflip-btn" id="button-clicker-reset-btn">Reset</button>
    </div>
  </main>
<script src="/javascript/btnClicker.js"></script>
</body>
</html>
